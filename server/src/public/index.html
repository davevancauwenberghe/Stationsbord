<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stationsbord" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Stationsbord</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png?v=0.4.0c" />
  <link rel="manifest" href="/site.webmanifest?v=0.4.0c">

  <!-- Cache-busted assets -->
  <link rel="stylesheet" href="/styles.css?v=0.4.0c" />
</head>

<body>
  <header class="topbar">
    <h1>Stationsbord</h1>
    <label class="languageMenu" for="languageSelect">
      <span class="languageSelectWrap">
        <select id="languageSelect" aria-label="Language">
          <option value="nl">NL</option>
          <option value="fr">FR</option>
          <option value="de">DE</option>
          <option value="en">ENG</option>
        </select>
        <span class="chev languageChev" aria-hidden="true">›</span>
      </span>
    </label>
  </header>

  <!-- Offline / stale cache banner -->
  <div class="banner" id="offlineBanner" hidden></div>

  <div class="row">
    <div class="autocomplete">
      <div class="stationRow">
        <div class="stationInputWrap">
          <input
            id="q"
            placeholder="Type a station (e.g. Gent, Bruxelles)"
            autocomplete="off"
            autocapitalize="words"
            spellcheck="false"
            enterkeyhint="go"
            aria-label="Station"
            aria-autocomplete="list"
            aria-controls="dropdown"
            aria-expanded="false"
          />
        </div>
      </div>
      <div class="dropdown" id="dropdown" role="listbox"></div>
    </div>


    <!-- Disturbances pill -->
    <button
      class="pill pillBtn"
      id="disturbancePill"
      type="button"
      title="View disturbances"
    >
      disturbances…
    </button>

  </div>

  <div class="controls">
    <label>
      Date (DD/MM/YYYY)
      <input
        class="small"
        id="datePretty"
        placeholder="DD/MM/YYYY"
        inputmode="numeric"
        pattern="[0-9/]*"
        enterkeyhint="next"
        autocomplete="off"
        aria-label="Date"
      />
    </label>

    <label>
      Time (HH:MM)
      <input
        class="small"
        id="timePretty"
        placeholder="HH:MM"
        inputmode="numeric"
        pattern="[0-9:]*"
        enterkeyhint="done"
        autocomplete="off"
        aria-label="Time"
      />
    </label>

    <button class="btn-ghost" id="btnNow" type="button" title="Set to current time (local)">
      Now
    </button>
    <button
      class="btn-ghost"
      id="btnPlus1h"
      type="button"
      title="Add one hour from the currently selected time"
    >
      +1h
    </button>

  </div>

  <!-- Shared shell -->
  <div class="appShell">

    <div class="board" id="board">
      <div class="muted">
        Start typing a station name or tap the field to pick a recent station. Selecting a station loads the board.
      </div>
    </div>

    <footer class="footerWrap">
      <div class="footerBox">
        with love from
        <a href="https://www.davevancauwenberghe.be" target="_blank" rel="noopener">dvc.</a>
        · powered by
        <a href="https://irail.be" target="_blank" rel="noopener">iRail API</a>
        · v0.4.0c
      </div>
    </footer>

  </div>

  <!-- Shared Overlay (train details + disturbances) -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <div class="modalHeader">
        <div class="modalTitle" id="modalTitle">Train details</div>
        <span class="pill" id="modalPill">vehicle</span>
        <button
          class="closeBtn"
          id="overlayClose"
          type="button"
          aria-label="Close"
        >✕</button>
      </div>

      <div class="modalBody" id="modalBody">
        <div class="muted">Loading…</div>
      </div>
    </div>
  </div>

  <!-- App logic -->
  <script src="/app.js?v=0.4.0c" defer></script>
</body>
</html>
